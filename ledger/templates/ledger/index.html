{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intelligere</title>
    <script>
      // Applied before first paint so the page never flashes the wrong theme.
      (function () {
        var saved = localStorage.getItem('ledger-theme');
        var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'ledger/css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'ledger/css/responsive.css' %}" />
  </head>
  <body>
    <div class="app">
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">
            <img
              src="{% static 'ledger/logo.jpeg' %}"
              alt="Logo"
              class="brand-logo"
              onerror="this.style.display = 'none'"
            />
          </div>
          <div>
            <div class="brand-name">
              <span style="color: var(--accent-2)">Intelligere</span>
            </div>
          </div>
        </div>
        <nav class="modules">
          <button class="module active" data-module="outstanding">
            <span class="m-icon"
              ><svg
                stroke="currentColor"
                fill="none"
                stroke-width="2"
                viewBox="0 0 24 24"
                stroke-linecap="round"
                stroke-linejoin="round"
                height="1em"
                width="1em"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                ></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline></svg></span
            ><span>Outstanding Invoices</span>
          </button>
          <button class="module" data-module="orders">
            <span class="m-icon"
              ><svg
                stroke="currentColor"
                fill="none"
                stroke-width="2"
                viewBox="0 0 24 24"
                stroke-linecap="round"
                stroke-linejoin="round"
                height="1em"
                width="1em"
                xmlns="http://www.w3.org/2000/svg"
              >
                <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
                <path
                  d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                ></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line></svg></span
            ><span>Order Book</span>
          </button>
          <button class="module" data-module="inventory">
            <span class="m-icon"
              ><svg
                stroke="currentColor"
                fill="none"
                stroke-width="2"
                viewBox="0 0 24 24"
                stroke-linecap="round"
                stroke-linejoin="round"
                height="1em"
                width="1em"
                xmlns="http://www.w3.org/2000/svg"
              >
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line></svg></span
            ><span>Inventory</span>
          </button>
          <div class="sidebar-most-used" id="sidebarMostUsed"></div>
        </nav>
      </aside>
      <main class="chat">
        <div class="chat-header">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <div class="avatar">
            <img
              src="{% static 'ledger/logo.jpeg' %}"
              alt="Logo"
              style="
                width: 100%;
                height: 100%;
                object-fit: contain;
                border-radius: 10px;
              "
            />
          </div>
          <div>
            <div class="chat-title" id="chatTitle">Outstanding Invoices</div>
          </div>
          <button
            class="theme-toggle"
            id="themeToggle"
            type="button"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input-wrapper">
          <div class="chat-input-stack">
            <div class="pebble-dock" id="pebbleDock"></div>
            <div class="chat-input-bar">
              <textarea
                id="chatInput"
                rows="1"
                placeholder="Ask me anything..."
                autocomplete="off"
              ></textarea>
              <button class="send-btn" id="sendBtn">
                <svg
                  stroke="currentColor"
                  fill="currentColor"
                  stroke-width="0"
                  viewBox="0 0 512 512"
                  height="1em"
                  width="1em"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M48 448l416-192L48 64v149.333L346 256 48 298.667z"
                  ></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    {# Hidden csrftoken input purely so Django sets the csrftoken cookie on #}
    {# load; the export-to-PDF fetch in main.js reads that cookie. #}
    <form style="display:none">{% csrf_token %}</form>

    <script>
      window.TOTAL_LEDGERS = "{{ ledger_count|escapejs }}";
      const QUERY_URL = "{% url 'ledger:query_api' %}";
      const SEARCH_URL = "{% url 'ledger:ledger_search_api' %}";
      const DETAIL_URL = "{% url 'ledger:ledger_detail_api' %}";
      const AGING_URL = "{% url 'ledger:ledger_aging_api' %}";
      const TRANSACTIONS_URL = "{% url 'ledger:ledger_transactions_api' %}";
      const ORDER_QUERY_URL = "{% url 'ledger:order_query_api' %}";
      const INVENTORY_QUERY_URL = "{% url 'ledger:inventory_query_api' %}";
      const ITEM_SEARCH_URL = "{% url 'ledger:stock_item_search_api' %}";
      const EXPORT_PDF_URL = "{% url 'ledger:export_pdf_api' %}";
      const LOGO_URL = "{% static 'ledger/logo.jpeg' %}";
    </script>
    <script src="{% static 'ledger/js/main.js' %}"></script>
  </body>
</html>
